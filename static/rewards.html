<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Rewards — EatRate</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="mark">🍴</div><h1>Rewards</h1></div>
    </header>
    <main>
      <div id="list" class="loading">Loading rewards…</div>
    </main>
    <div id="tabbar-slot"></div>
  </div>

  <div id="modal-backdrop" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000;"></div>
  <div id="redeem-modal" style="display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--card); border:1px solid var(--border); border-bottom:none; border-radius:18px 18px 0 0; padding:20px; z-index:3001;">
    <h3 style="margin-top:0;">Choose a restaurant</h3>
    <p style="color:var(--muted); font-size:14px; margin-top:-8px;">Your $10 gift card will be issued for this restaurant.</p>
    <div id="modal-error" style="display:none;" class="error-msg"></div>
    <select id="restaurant-select"></select>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="secondary" id="cancel-redeem" style="flex:1;">Cancel</button>
      <button class="primary" id="confirm-redeem" style="flex:1;">Redeem</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let activeRewardId = null;
    let restaurantsCache = [];

    function closeModal() {
      document.getElementById("modal-backdrop").style.display = "none";
      document.getElementById("redeem-modal").style.display = "none";
      activeRewardId = null;
    }

    async function openModal(rewardId) {
      activeRewardId = rewardId;
      document.getElementById("modal-error").style.display = "none";
      if (restaurantsCache.length === 0) {
        const { restaurants } = await api.get("/api/restaurants");
        restaurantsCache = restaurants;
      }
      const select = document.getElementById("restaurant-select");
      select.innerHTML = restaurantsCache
        .map((r) => `<option value="${r.id}">${escapeHtml(r.name)}</option>`)
        .join("");
      document.getElementById("modal-backdrop").style.display = "block";
      document.getElementById("redeem-modal").style.display = "block";
    }

    let redemptionEnabled = true;

    function comingSoonBanner() {
      return `
        <div class="card" style="border:1px dashed var(--border); background:var(--card-2);">
          <div style="font-weight:700; font-size:14px;">🚧 Redemption launches with our soft-launch partners</div>
          <div style="color:var(--muted); font-size:13px; margin-top:4px;">
            Keep earning — your rewards are saved. Redemption opens once we've picked the restaurants
            for our soft launch.
          </div>
        </div>
      `;
    }

    async function loadRewards(feedbackMessage) {
      const { rewards, redemption_enabled } = await api.get("/api/rewards");
      redemptionEnabled = redemption_enabled;
      const list = document.getElementById("list");
      const feedbackHtml = feedbackMessage
        ? `<div class="success-msg" style="margin-bottom:12px;">${escapeHtml(feedbackMessage)}</div>`
        : "";
      const bannerHtml = redemptionEnabled ? "" : comingSoonBanner();

      if (rewards.length === 0) {
        list.className = "empty-state";
        list.innerHTML =
          feedbackHtml + bannerHtml + "No rewards yet.<br/>Share 5 posts to earn your first $10 gift card.";
        return;
      }
      list.className = "";
      list.innerHTML =
        feedbackHtml +
        bannerHtml +
        rewards
          .map((r) => {
            if (r.review_status === "pending") {
              if (!redemptionEnabled) {
                return `
                  <div class="card reward-card">
                    <div class="amount">${centsToDollars(r.amount_cents)}</div>
                    <span class="badge pending">Earned — redemption coming soon</span>
                  </div>
                `;
              }
              return `
                <div class="card reward-card">
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                      <div class="amount">${centsToDollars(r.amount_cents)}</div>
                      <span class="badge pending">Ready to redeem</span>
                    </div>
                    <button class="primary" onclick="openModal(${r.id})">Redeem</button>
                  </div>
                </div>
              `;
            }
            if (r.review_status === "under_review") {
              return `
                <div class="card">
                  <div style="font-weight:700;">${centsToDollars(r.amount_cents)}${r.restaurant_name ? " · " + escapeHtml(r.restaurant_name) : ""}</div>
                  <span class="badge pending">Under review</span>
                  <div style="color:var(--muted); font-size:13px; margin-top:8px;">
                    During our pilot, redemptions are manually checked before the card is issued.
                    You'll see your gift code here once it's approved.
                  </div>
                </div>
              `;
            }
            if (r.review_status === "rejected") {
              return `
                <div class="card">
                  <div style="font-weight:700;">${centsToDollars(r.amount_cents)}</div>
                  <span class="badge" style="background:var(--danger-soft); color:var(--danger);">Not approved</span>
                  <div style="color:var(--muted); font-size:13px; margin-top:8px;">
                    This redemption wasn't approved. Contact us if you think this is a mistake.
                  </div>
                </div>
              `;
            }
            return `
              <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                  <div>
                    <div style="font-weight:700;">${centsToDollars(r.amount_cents)} · ${escapeHtml(r.restaurant_name || "")}</div>
                    <span class="badge redeemed">Redeemed</span>
                  </div>
                </div>
                <div class="gift-code">${escapeHtml(r.gift_code)}</div>
              </div>
            `;
          })
          .join("");
    }

    document.getElementById("cancel-redeem").addEventListener("click", closeModal);
    document.getElementById("modal-backdrop").addEventListener("click", closeModal);

    document.getElementById("confirm-redeem").addEventListener("click", async () => {
      const btn = document.getElementById("confirm-redeem");
      const errorBox = document.getElementById("modal-error");
      errorBox.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Redeeming…";
      try {
        const restaurantId = document.getElementById("restaurant-select").value;
        const result = await api.post(`/api/rewards/${activeRewardId}/redeem`, { restaurant_id: parseInt(restaurantId, 10) });
        closeModal();
        if (result.under_review) {
          await loadRewards("Submitted! During our pilot, redemptions are manually reviewed before the gift card is issued.");
        } else {
          await loadRewards();
        }
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Redeem";
      }
    });

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById("tabbar-slot").innerHTML = renderTabbar("Rewards");
      try {
        await loadRewards();
      } catch (e) {
        document.getElementById("list").textContent = "Failed to load rewards.";
      }
    })();
  </script>
</body>
</html>
