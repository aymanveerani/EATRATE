<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>EatRate</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🍴</div>
        <div class="wordmark"><h1>EatRate</h1><span class="tagline">Share every bite</span></div>
      </div>
    </header>
    <main id="main">
      <a href="/capture.html" class="card" style="display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;">
        <div style="width:44px; height:44px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;">📸</div>
        <div>
          <div style="font-weight:700;">What are you eating?</div>
          <div style="color:var(--muted); font-size:13px;">Snap a photo to share it with your friends</div>
        </div>
      </a>

      <div id="popular-section" style="display:none;">
        <div class="nearby-section-head">
          <h2>Most popular near you</h2>
        </div>
        <div id="popular-content" class="loading">Finding popular spots…</div>
      </div>

      <div id="ftc-banner-slot"></div>

      <div class="nearby-section-head">
        <h2>What people are posting nearby</h2>
      </div>
      <div id="feed" class="loading">Loading feed…</div>

      <div class="nearby-section-head">
        <h2>Restaurants near you</h2>
        <span class="sub">Tap to see reviews</span>
      </div>
      <div id="nearby-content" class="loading">Finding restaurants near you…</div>
    </main>
    <div id="tabbar-slot"></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    let lastNearbyRestaurants = [];

    function getPosition() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation not supported"));
          return;
        }
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
      });
    }

    function renderLocatePrompt() {
      const nearbyContent = document.getElementById("nearby-content");
      nearbyContent.className = "card nearby-locate-card";
      nearbyContent.innerHTML = `
        <div style="font-size:13px; color:var(--muted);">Enable location to see restaurants and posts near you.</div>
        <button class="primary" id="enable-location-btn">Enable location</button>
      `;
      document.getElementById("enable-location-btn").addEventListener("click", loadPage);

      const feed = document.getElementById("feed");
      feed.className = "empty-state";
      feed.textContent = "Enable location to see what people are posting near you.";
    }

    async function loadNearby(pos) {
      const nearbyContent = document.getElementById("nearby-content");
      nearbyContent.className = "loading";
      nearbyContent.textContent = "Finding restaurants near you…";
      try {
        const { restaurants } = await api.get(
          `/api/restaurants/nearby?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`
        );
        lastNearbyRestaurants = restaurants;
        if (restaurants.length === 0) {
          nearbyContent.className = "empty-state";
          nearbyContent.textContent = "No restaurants found nearby yet.";
          return;
        }
        nearbyContent.className = "nearby-scroll";
        nearbyContent.innerHTML = restaurants.map(renderNearbyCard).join("");
      } catch (err) {
        nearbyContent.className = "empty-state";
        nearbyContent.textContent = "Couldn't load nearby restaurants.";
      }
    }

    async function loadPopular(pos) {
      const section = document.getElementById("popular-section");
      const content = document.getElementById("popular-content");
      try {
        const { restaurants } = await api.get(
          `/api/restaurants/popular?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`
        );
        if (restaurants.length === 0) {
          section.style.display = "none";
          return;
        }
        section.style.display = "";
        content.className = "nearby-scroll";
        content.innerHTML = restaurants.map(renderNearbyCard).join("");
      } catch (err) {
        section.style.display = "none";
      }
    }

    function renderFeedFallback() {
      const feed = document.getElementById("feed");
      if (lastNearbyRestaurants.length === 0) {
        feed.className = "empty-state";
        feed.innerHTML = `No posts near you yet.<br/>Be the first to share what you're eating!`;
        return;
      }
      feed.className = "";
      feed.innerHTML = `
        <div class="empty-state" style="margin-bottom:8px;">No posts near you yet — check out these restaurants:</div>
        <div class="nearby-scroll">${lastNearbyRestaurants.map(renderNearbyCard).join("")}</div>
      `;
    }

    async function loadFeed(pos) {
      const feed = document.getElementById("feed");
      feed.className = "loading";
      feed.textContent = "Loading feed…";
      try {
        const { posts } = await api.get(
          `/api/feed?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`
        );
        if (posts.length === 0) {
          renderFeedFallback();
          return;
        }
        feed.className = "";
        feed.innerHTML = posts.map(renderPostCard).join("");
      } catch (e) {
        feed.className = "empty-state";
        feed.textContent = "Failed to load feed.";
      }
    }

    async function loadPage() {
      document.getElementById("nearby-content").className = "loading";
      document.getElementById("nearby-content").textContent = "Finding restaurants near you…";
      document.getElementById("feed").className = "loading";
      document.getElementById("feed").textContent = "Loading feed…";
      document.getElementById("popular-section").style.display = "none";
      try {
        const pos = await getPosition();
        // loadNearby first: it populates lastNearbyRestaurants, which
        // loadFeed's empty-state fallback reads — running it after would
        // show that fallback with no restaurants yet on a fast response.
        await loadNearby(pos);
        await Promise.all([loadFeed(pos), loadPopular(pos)]);
      } catch (err) {
        renderLocatePrompt();
      }
    }

    (async () => {
      const user = await requireAuth();
      if (!user) return;

      document.getElementById("tabbar-slot").innerHTML = renderTabbar("Feed");
      document.getElementById("ftc-banner-slot").innerHTML = ftcBanner();
      wireCheerButtons(document.getElementById("main"));
      wireDeleteButtons(document.getElementById("main"));
      initReportModal(document.getElementById("main"));
      loadPage();
    })();
  </script>
</body>
</html>
