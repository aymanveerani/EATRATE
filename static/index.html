<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>EatRate</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🍴</div>
        <div class="wordmark"><h1>EatRate</h1><span class="tagline">Share every bite</span></div>
      </div>
    </header>
    <main id="main">
      <a href="/capture.html" class="card" style="display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;">
        <div style="width:44px; height:44px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;">📸</div>
        <div>
          <div style="font-weight:700;">What are you eating?</div>
          <div style="color:var(--muted); font-size:13px;">Snap a photo to share it with your friends</div>
        </div>
      </a>
      <div id="ftc-banner-slot"></div>
      <div id="feed" class="loading">Loading feed…</div>
    </main>
    <div id="tabbar-slot"></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    (async () => {
      const user = await requireAuth();
      if (!user) return;

      document.getElementById("tabbar-slot").innerHTML = renderTabbar("Feed");
      document.getElementById("ftc-banner-slot").innerHTML = ftcBanner();
      wireCheerButtons(document.getElementById("main"));
      initReportModal(document.getElementById("main"));

      try {
        const { posts } = await api.get("/api/feed");
        const feed = document.getElementById("feed");
        if (posts.length === 0) {
          feed.className = "empty-state";
          feed.innerHTML = `No posts yet.<br/>Be the first to share what you're eating, or <a href="/friends.html" style="color:var(--accent); font-weight:600;">add some friends</a>.`;
          return;
        }
        feed.className = "";
        feed.innerHTML = posts.map(renderPostCard).join("");
      } catch (e) {
        document.getElementById("feed").textContent = "Failed to load feed.";
      }
    })();
  </script>
</body>
</html>
