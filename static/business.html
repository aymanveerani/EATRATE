<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Business dashboard — EatRate</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
      margin: 12px 0 4px;
    }
    .chart .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
    }
    .chart .bar {
      width: 100%;
      max-width: 22px;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      border-radius: 3px 3px 0 0;
      min-height: 3px;
    }
    .chart .bar-label {
      font-size: 9px;
      color: var(--muted-dim);
      margin-top: 4px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      max-height: 40px;
    }
    .stat-row { display: flex; gap: 16px; margin-top: 10px; }
    .stat-row .stat-value { font-weight: 800; font-size: 20px; }
    .stat-row .stat-label { color: var(--muted); font-size: 12px; }
    .insights-card {
      border: 1px solid var(--accent);
      background: var(--accent-soft);
    }
    .insights-card .insights-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .insights-card p { margin: 0; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="mark">🍴</div><h1>Business</h1></div>
      <a href="/index.html" class="secondary" style="padding:8px 12px; font-size:13px; text-decoration:none; border-radius:12px; border:1px solid var(--border); color:var(--ink);">Claim another</a>
    </header>
    <main id="content" class="loading">Loading…</main>
    <div id="tabbar-slot"></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    function renderChart(weekly) {
      if (weekly.length === 0) return `<div style="color:var(--muted); font-size:13px;">Not enough data yet for a trend chart.</div>`;
      const recent = weekly.slice(-10);
      const bars = recent
        .map((w) => {
          const heightPct = Math.max((w.avg_rating / 10) * 100, 4);
          return `
            <div class="bar-wrap" title="${w.week}: ${w.avg_rating}/10 avg, ${w.post_count} post${w.post_count === 1 ? "" : "s"}">
              <div class="bar" style="height:${heightPct}%;"></div>
            </div>`;
        })
        .join("");
      return `<div class="chart">${bars}</div><div style="color:var(--muted-dim); font-size:11px; text-align:center;">Avg rating by week (last ${recent.length})</div>`;
    }

    function renderTrialBanner(trialEndsAt) {
      if (!trialEndsAt) return "";
      const end = new Date(trialEndsAt.replace(" ", "T") + "Z");
      const daysLeft = Math.ceil((end.getTime() - Date.now()) / (1000 * 60 * 60 * 24));
      if (daysLeft > 0) {
        return `
          <div class="badge pending" style="margin-top:8px;">
            🎁 Free trial — ${daysLeft} day${daysLeft === 1 ? "" : "s"} left
          </div>`;
      }
      return `
        <div class="badge" style="margin-top:8px; background:var(--danger-soft); color:var(--danger);">
          Trial ended
        </div>`;
    }

    function renderBusiness(b) {
      const photosHtml = b.posts.length
        ? `<div class="photo-grid">${b.posts.map((p) => `<a href="/restaurant.html?id=${b.restaurant_id}"><img src="${p.photo_url}" loading="lazy" /></a>`).join("")}</div>`
        : `<div class="empty-state">No reviews yet.</div>`;

      return `
        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <div style="font-weight:800; font-size:18px;">${escapeHtml(b.restaurant_name)}</div>
              <div style="color:var(--muted); font-size:13px;">${escapeHtml(b.cuisine || "Restaurant")}${b.address ? " · " + escapeHtml(b.address) : ""}</div>
              ${renderTrialBanner(b.trial_ends_at)}
            </div>
            <a href="/restaurant.html?id=${b.restaurant_id}" style="color:var(--accent); font-size:13px; font-weight:600; text-decoration:none; white-space:nowrap;">View page →</a>
          </div>
          <div class="stat-row">
            <div><div class="stat-value">${b.avg_rating || "—"}</div><div class="stat-label">Avg rating</div></div>
            <div><div class="stat-value">${b.post_count}</div><div class="stat-label">Reviews</div></div>
            <div><div class="stat-value">${b.total_cheers}</div><div class="stat-label">Cheers</div></div>
          </div>
          ${renderChart(b.weekly)}
        </div>
        <div class="card insights-card">
          <div class="insights-label">✨ AI Insights</div>
          <p>${escapeHtml(b.insights)}</p>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">Customer photos</h3>
          ${photosHtml}
        </div>
      `;
    }

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById("tabbar-slot").innerHTML = renderTabbar("Profile");

      try {
        const { businesses } = await api.get("/api/business/dashboard");
        const content = document.getElementById("content");
        if (businesses.length === 0) {
          content.className = "empty-state";
          content.innerHTML = `You haven't claimed any restaurants yet.<br/><a href="/index.html" style="color:var(--accent); font-weight:600;">Find yours in the feed →</a>`;
          return;
        }
        content.className = "";
        content.innerHTML = businesses.map(renderBusiness).join("");
      } catch (e) {
        document.getElementById("content").textContent = "Failed to load your business dashboard.";
      }
    })();
  </script>
</body>
</html>
